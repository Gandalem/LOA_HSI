services:
  data-init:
    image: busybox:1.36
    container_name: loa-hsi-data-init
    volumes:
      - ./data:/app/data
    command: >
      sh -c "mkdir -p /app/data/db /app/data/cache /app/data/raw /app/data/parquet
      && chown -R 10001:10001 /app/data
      && chmod -R u+rwX,g+rwX /app/data"

  backend:
    build:
      context: ./backend
    container_name: loa-hsi-backend
    depends_on:
      data-init:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: loa-hsi-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:8080"
