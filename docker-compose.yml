services:
  backend:
    build:
      context: ./backend
    container_name: loa-hsi-backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: loa-hsi-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
