services:
  backend:
    build:
      context: ./backend
    container_name: loa-hsi-backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: loa-hsi-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:8080"
