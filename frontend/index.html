<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOA-HSI</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var lastSignature = '';
        var lastMarketSignature = '';
        var currentCharacter = null;
        var loadedMemoryKey = '';
        var loadedMemoryHints = null;
        var ignoredMemoryKeys = {};
        var pendingComparePayload = null;

        function number(value, digits) {
          var n = Number(value);
          if (!Number.isFinite(n)) return '-';
          return n.toLocaleString('ko-KR', { maximumFractionDigits: digits == null ? 1 : digits });
        }
        function gold(value) {
          var n = Number(value);
          if (!Number.isFinite(n)) return '-';
          return n.toLocaleString('ko-KR', { maximumFractionDigits: 0 }) + 'G';
        }
        function percent(value) {
          var n = Number(value);
          if (!Number.isFinite(n)) return '계산 안 함';
          return (n * 100).toFixed(4) + '%';
        }
        function roleLabel(value) {
          var map = { core: '핵심', secondary: '보조', conditional: '조건부', unmatched: '미분류' };
          return map[value] || value || '-';
        }
        function basisLabel(value) {
          var map = {
            user_input: '사용자 입력',
            auto_special_count: '자동 추정 · 특수옵션 3개 감지',
            auto_special_count_requires_all_random_special: '특수옵션 3개 랜덤 필요',
            auto_estimate: '자동 추정',
            auto_fallback: '자동 보정',
            partial_user_input_auto_completed: '일부 입력 + 자동 보정',
            official_distribution: '공식 분포'
          };
          return map[value] || value || '-';
        }
        function escapeHtml(value) {
          return String(value == null ? '' : value).replace(/[&<>"]/g, function (ch) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[ch];
          });
        }
        function cloneJson(value) {
          try { return JSON.parse(JSON.stringify(value || {})); } catch (e) { return {}; }
        }
        function characterNameOf(character) {
          return String((character && (character.character_name || character.characterName)) || '').trim();
        }
        function serverNameOf(character) {
          return String((character && (character.server_name || character.serverName)) || 'unknown').trim() || 'unknown';
        }
        function memoryKeyFor(characterName, serverName) {
          return 'loa-hsi:memory:v1:' + encodeURIComponent(serverName || 'unknown') + ':' + encodeURIComponent(characterName || 'unknown');
        }
        function currentMemoryKey(payloadCharacterName) {
          var name = payloadCharacterName || characterNameOf(currentCharacter);
          var server = serverNameOf(currentCharacter);
          return memoryKeyFor(name, server);
        }
        function formatSavedAt(value) {
          if (!value) return '-';
          try { return new Date(value).toLocaleString('ko-KR'); } catch (e) { return value; }
        }
        function getSavedMemory(character) {
          var name = characterNameOf(character);
          if (!name) return null;
          var key = memoryKeyFor(name, serverNameOf(character));
          try {
            var raw = localStorage.getItem(key);
            if (!raw) return null;
            var parsed = JSON.parse(raw);
            parsed.__key = key;
            return parsed;
          } catch (e) {
            return null;
          }
        }
        function setNativeValue(element, value) {
          if (!element) return;
          var next = value == null ? '' : String(value);
          var prototype = Object.getPrototypeOf(element);
          var descriptor = Object.getOwnPropertyDescriptor(prototype, 'value');
          if (descriptor && descriptor.set) descriptor.set.call(element, next);
          else element.value = next;
          element.dispatchEvent(new Event('input', { bubbles: true }));
          element.dispatchEvent(new Event('change', { bubbles: true }));
        }
        function panelByText(selector, text) {
          return Array.from(document.querySelectorAll(selector)).find(function (panel) {
            return (panel.textContent || '').indexOf(text) >= 0;
          });
        }
        function applyBraceletSlotInputsFromMemory(memoryHints) {
          var bracelet = (memoryHints && memoryHints.braceletAcquisition) || {};
          var fixed = document.querySelector('[data-loa-hsi-bracelet-fixed-count]');
          var random = document.querySelector('[data-loa-hsi-bracelet-random-count]');
          if (fixed && bracelet.fixedOptionCount != null) setNativeValue(fixed, bracelet.fixedOptionCount || '');
          if (random && bracelet.randomOptionSlotCount != null) setNativeValue(random, bracelet.randomOptionSlotCount || '');
        }
        function applyPityRecordsFromMemory(records) {
          var rowsData = Array.isArray(records) && records.length ? records : [{ part: 'unknown', target: 'unknown' }];
          var panel = panelByText('.pity-record-panel', '장기백 기록');
          if (!panel) return;
          var addButton = panel.querySelector('.pity-record-header button');
          function syncRows() {
            var rows = Array.from(panel.querySelectorAll('.pity-record-row'));
            if (addButton && rows.length < rowsData.length) {
              addButton.click();
              setTimeout(syncRows, 40);
              return;
            }
            rows.forEach(function (row, index) {
              var record = rowsData[index] || { part: 'unknown', target: 'unknown' };
              var selects = row.querySelectorAll('select');
              setNativeValue(selects[0], record.part || 'unknown');
              setTimeout(function () {
                var refreshedRows = Array.from(panel.querySelectorAll('.pity-record-row'));
                var refreshedSelects = refreshedRows[index] ? refreshedRows[index].querySelectorAll('select') : selects;
                setNativeValue(refreshedSelects[1], record.target || 'unknown');
              }, 60);
            });
          }
          syncRows();
        }
        function applyAccessoryAcquisitionsFromMemory(accessoryAcquisitions) {
          var panel = panelByText('.accessory-acquisition-panel', '장신구 획득 방식');
          if (!panel || !accessoryAcquisitions) return;
          var keys = Object.keys(accessoryAcquisitions);
          var rows = Array.from(panel.querySelectorAll('.accessory-acquisition-row'));
          rows.forEach(function (row, index) {
            var saved = accessoryAcquisitions[keys[index]];
            if (!saved) return;
            var select = row.querySelector('select');
            setNativeValue(select, saved.mode || 'unknown');
            setTimeout(function () {
              var refreshedRows = Array.from(panel.querySelectorAll('.accessory-acquisition-row'));
              var input = refreshedRows[index] && refreshedRows[index].querySelector('input[type="number"]');
              if (input && saved.attempts != null) setNativeValue(input, saved.attempts || '');
            }, 80);
          });
        }
        function applyBraceletAcquisitionFromMemory(bracelet) {
          var panel = panelByText('.accessory-acquisition-panel', '팔찌 랜덤 옵션 시도');
          if (!panel || !bracelet) return;
          var row = panel.querySelector('.accessory-acquisition-row');
          if (!row) return;
          setNativeValue(row.querySelector('select'), bracelet.mode || 'unknown');
          setTimeout(function () {
            var refreshed = panel.querySelector('.accessory-acquisition-row');
            var input = refreshed && refreshed.querySelector('input[type="number"]');
            if (input && bracelet.attempts != null) setNativeValue(input, bracelet.attempts || '');
          }, 80);
        }
        function applyMemoryHintsToForm(memoryHints) {
          var hints = memoryHints || {};
          applyPityRecordsFromMemory(hints.pityRecords);
          var stone = document.querySelector('input[placeholder="예: 120"]');
          if (stone && hints.stoneAttempts != null) setNativeValue(stone, hints.stoneAttempts || '');
          applyAccessoryAcquisitionsFromMemory(hints.accessoryAcquisitions || {});
          applyBraceletAcquisitionFromMemory(hints.braceletAcquisition || {});
          applyBraceletSlotInputsFromMemory(hints);
          setTimeout(function () { applyBraceletSlotInputsFromMemory(hints); }, 120);
        }
        function saveMemoryRecord(payload, character) {
          if (!payload || !payload.memoryHints) return;
          var name = characterNameOf(character) || payload.characterName;
          if (!name) return;
          var server = serverNameOf(character);
          var key = memoryKeyFor(name, server);
          var record = {
            version: 1,
            characterName: name,
            serverName: server,
            savedAt: new Date().toISOString(),
            memoryHints: cloneJson(payload.memoryHints)
          };
          try {
            localStorage.setItem(key, JSON.stringify(record));
            renderMemoryPanel(character || currentCharacter, '현재 기억 기록을 이 브라우저에 저장했습니다.');
          } catch (e) {
            renderMemoryPanel(character || currentCharacter, '브라우저 저장소에 기록을 저장하지 못했습니다.');
          }
        }
        function renderMemoryPanel(character, statusText) {
          if (!character) return;
          var memoryPanelHost = document.querySelector('.memory-panel');
          if (!memoryPanelHost) return;
          var old = document.querySelector('[data-loa-hsi-memory-panel="true"]');
          var saved = getSavedMemory(character);
          var key = memoryKeyFor(characterNameOf(character), serverNameOf(character));
          var isLoaded = loadedMemoryKey === key && !!loadedMemoryHints;
          var isIgnored = !!ignoredMemoryKeys[key];
          var panel = document.createElement('div');
          panel.className = 'notice-panel loa-hsi-memory-panel';
          panel.dataset.loaHsiMemoryPanel = 'true';
          var body = '<strong>기억 기록 저장 상태</strong>'
            + '<p class="hint">v58부터 기억 기반 보조 판정은 서버가 아니라 이 브라우저 localStorage에만 저장합니다. 클라우드 배포 후에도 다른 사용자와 공유되지 않습니다.</p>';
          if (saved && !isIgnored) {
            body += '<p class="hint">이 캐릭터에 저장된 기록이 있습니다. 마지막 저장: ' + escapeHtml(formatSavedAt(saved.savedAt)) + '</p>'
              + '<div class="row">'
              + '<button type="button" class="ghost tiny-button" data-memory-action="load">불러오기</button>'
              + '<button type="button" class="ghost tiny-button" data-memory-action="ignore">무시</button>'
              + '<button type="button" class="ghost tiny-button" data-memory-action="delete">삭제</button>'
              + '</div>';
          } else if (isIgnored) {
            body += '<p class="hint">이번 세션에서는 저장된 기록을 무시합니다. 리포트 생성 시 현재 입력값이 다시 저장됩니다.</p>'
              + '<div class="row"><button type="button" class="ghost tiny-button" data-memory-action="unignore">다시 보기</button></div>';
          } else {
            body += '<p class="hint">저장된 기록이 없습니다. 억까 리포트 생성 시 현재 입력값이 자동 저장됩니다.</p>';
          }
          if (isLoaded) {
            body += '<p class="hint"><strong>불러온 기록을 화면 입력값과 다음 리포트 생성 요청에 반영했습니다.</strong></p>';
          }
          if (statusText) body += '<p class="hint"><strong>' + escapeHtml(statusText) + '</strong></p>';
          panel.innerHTML = body;
          panel.addEventListener('click', function (event) {
            var action = event.target && event.target.getAttribute('data-memory-action');
            if (!action) return;
            if (action === 'load' && saved) {
              loadedMemoryKey = key;
              loadedMemoryHints = cloneJson(saved.memoryHints);
              ignoredMemoryKeys[key] = false;
              window.__LOA_HSI_LOADED_MEMORY_HINTS__ = loadedMemoryHints;
              try {
                window.dispatchEvent(new CustomEvent('loa-hsi-load-memory-hints', { detail: { memoryHints: loadedMemoryHints, character: character } }));
              } catch (e) {}
              applyMemoryHintsToForm(loadedMemoryHints);
              setTimeout(function () { applyMemoryHintsToForm(loadedMemoryHints); }, 180);
              renderMemoryPanel(character, '저장된 기억 기록을 화면 입력값에 반영했습니다.');
            } else if (action === 'ignore') {
              ignoredMemoryKeys[key] = true;
              if (loadedMemoryKey === key) {
                loadedMemoryKey = '';
                loadedMemoryHints = null;
              }
              renderMemoryPanel(character, '이번 세션에서 저장 기록을 무시합니다.');
            } else if (action === 'unignore') {
              ignoredMemoryKeys[key] = false;
              renderMemoryPanel(character, '저장 기록을 다시 표시합니다.');
            } else if (action === 'delete') {
              try { localStorage.removeItem(key); } catch (e) {}
              if (loadedMemoryKey === key) {
                loadedMemoryKey = '';
                loadedMemoryHints = null;
              }
              renderMemoryPanel(character, '저장된 기억 기록을 삭제했습니다.');
            }
          });
          if (old) old.replaceWith(panel);
          else memoryPanelHost.prepend(panel);
        }
        function setCurrentCharacter(character) {
          if (!character || !characterNameOf(character)) return;
          currentCharacter = character;
          setTimeout(function () {
            injectBraceletSlotInputs();
            renderMemoryPanel(currentCharacter);
          }, 200);
        }
        function readBraceletSlotInputs() {
          var fixed = document.querySelector('[data-loa-hsi-bracelet-fixed-count]');
          var random = document.querySelector('[data-loa-hsi-bracelet-random-count]');
          return {
            fixedOptionCount: fixed && fixed.value ? fixed.value : '',
            randomOptionSlotCount: random && random.value ? random.value : ''
          };
        }
        function injectBraceletSlotInputs() {
          if (document.querySelector('[data-loa-hsi-bracelet-slot-inputs="true"]')) return;
          var panels = Array.from(document.querySelectorAll('.accessory-acquisition-panel'));
          var braceletPanel = panels.find(function (panel) { return (panel.textContent || '').indexOf('팔찌 랜덤 옵션 시도') >= 0; });
          if (!braceletPanel || (braceletPanel.textContent || '').indexOf('조회된 팔찌가 없습니다') >= 0) return;
          var row = document.createElement('div');
          row.className = 'accessory-acquisition-row';
          row.dataset.loaHsiBraceletSlotInputs = 'true';
          row.innerHTML = '<div class="accessory-acquisition-name"><strong>팔찌 구조 입력</strong><small>비워두면 자동 추정합니다. 특수옵션이 3개면 랜덤 3개 구성으로 우선 추정합니다.</small></div>'
            + '<select data-loa-hsi-bracelet-fixed-count><option value="">자동 추정 사용</option><option value="1">고정 1개</option><option value="2">고정 2개</option></select>'
            + '<select data-loa-hsi-bracelet-random-count><option value="">자동 추정 사용</option><option value="1">랜덤 1개</option><option value="2">랜덤 2개</option><option value="3">랜덤 3개</option></select>';
          braceletPanel.appendChild(row);
          if (loadedMemoryHints) applyBraceletSlotInputsFromMemory(loadedMemoryHints);
        }
        function cardSignature(data) {
          if (!data) return '';
          return JSON.stringify({
            version: data.version,
            matched: data.matchedEffectCount,
            unmatched: data.unmatchedEffectCount,
            core: data.coreEffectCount,
            randomProbability: data.randomOptionBasis && data.randomOptionBasis.weightedSuccessProbability,
            user: data.purchaseStructure && data.purchaseStructure.userInput,
            effects: (data.matchedEffects || []).map(function (row) { return [row.rawEffect, row.category, row.matchRole]; })
          });
        }
        function braceletCardHtml(data, signature) {
          var random = data.randomOptionBasis || {};
          var purchase = data.purchaseStructure || {};
          var userInput = purchase.userInput || {};
          var inference = userInput.inference || {};
          var fixedBasis = purchase.fixedEffectBasis || {};
          var randomBasis = purchase.randomEffectBasis || {};
          var effects = (data.matchedEffects || []).slice(0, 8);
          var limits = data.limits || [];
          var effectHtml = effects.length ? effects.map(function (row) {
            var category = row.categoryLabel || row.category || '-';
            return '<div class="combo-chip">'
              + '<span>' + escapeHtml(row.rawEffect) + '</span>'
              + '<strong>' + escapeHtml(category) + ' · ' + escapeHtml(roleLabel(row.matchRole)) + '</strong>'
              + '<small>카테고리 표기확률 ' + percent(row.categoryDisplayProbability) + '</small>'
              + '</div>';
          }).join('') : '<p class="hint">공식 카테고리와 매칭된 팔찌 효과가 없습니다.</p>';
          var limitHtml = limits.length ? '<ul>' + limits.map(function (line) { return '<li>' + escapeHtml(line) + '</li>'; }).join('') + '</ul>' : '';
          var targetCategories = (random.targetCategories || []).join(', ') || '-';
          var required = random.requiredRandomCategoryCounts || {};
          var requiredLabel = Object.keys(required).length ? Object.keys(required).map(function (key) { return key + ' ' + required[key] + '개'; }).join(', ') : '-';
          var fixedCount = fixedBasis.effectiveFixedOptionCount ?? userInput.fixedOptionCount;
          var randomCount = randomBasis.effectiveRandomOptionSlotCount ?? userInput.randomOptionSlotCount;
          var fixedLabel = fixedCount == null ? '자동 추정 불가' : '고정 ' + fixedCount + '개';
          var randomLabel = randomCount == null ? '자동 추정 불가' : '랜덤 ' + randomCount + '개';
          var calcBasis = inference.basis || random.requirementBasis || randomBasis.basis || '-';
          var calcReason = inference.reason || '-';
          return '<div class="expected-panel evidence-panel loa-hsi-bracelet-v54" data-loa-hsi-bracelet-v54="true" data-signature="' + escapeHtml(signature) + '">'
            + '<h3>팔찌 T4 공식 매칭</h3>'
            + '<p class="hint evidence-intro">v60.1 기준 팔찌 슬롯 수는 기본 자동 추정합니다. 특수옵션이 3개면 랜덤 3개 구성으로 우선 추정하고, 기대값은 필요한 카테고리 개수 기준으로 계산합니다.</p>'
            + '<div class="evidence-card-grid">'
            + '<section class="evidence-card">'
            + '<div class="evidence-card-head"><strong>구매/귀속 구조</strong><span>' + escapeHtml(data.gradeLabel || '-') + '</span></div>'
            + '<div class="evidence-line highlight"><span>고정 옵션 기준</span><strong>' + escapeHtml(fixedLabel) + '</strong></div>'
            + '<div class="evidence-line"><span>랜덤 슬롯 기준</span><strong>' + escapeHtml(randomLabel) + '</strong></div>'
            + '<div class="evidence-line"><span>계산 기준</span><strong>' + escapeHtml(basisLabel(calcBasis)) + '</strong></div>'
            + '<div class="evidence-line"><span>추정 사유</span><strong>' + escapeHtml(calcReason) + '</strong></div>'
            + '</section>'
            + '<section class="evidence-card">'
            + '<div class="evidence-card-head"><strong>현재 팔찌 매칭</strong><span>' + escapeHtml(data.role === 'support' ? '서포터' : '딜러') + '</span></div>'
            + '<div class="evidence-line highlight"><span>매칭 성공</span><strong>' + number(data.matchedEffectCount, 0) + '개</strong></div>'
            + '<div class="evidence-line"><span>특수옵션</span><strong>' + number(inference.specialEffectCount, 0) + '개</strong></div>'
            + '<div class="evidence-line"><span>핵심 효과</span><strong>' + number(data.coreEffectCount, 0) + '개</strong></div>'
            + '</section>'
            + '<section class="evidence-card">'
            + '<div class="evidence-card-head"><strong>랜덤 옵션 기준</strong><span>직접 돌린 슬롯</span></div>'
            + '<div class="evidence-line highlight"><span>필요 카테고리</span><strong>' + escapeHtml(requiredLabel) + '</strong></div>'
            + '<div class="evidence-line"><span>대상 카테고리</span><strong>' + escapeHtml(targetCategories) + '</strong></div>'
            + '<div class="evidence-line"><span>랜덤 슬롯 기준 성공률</span><strong>' + percent(random.weightedSuccessProbability) + '</strong></div>'
            + '<div class="evidence-line"><span>기대 시도 수</span><strong>' + number(random.expectedAttempts) + '회</strong></div>'
            + '</section>'
            + '</div>'
            + '<div class="notice-panel"><strong>전체 효과 확률</strong><p class="hint">' + escapeHtml(data.wholeBraceletEffectReason || '현재 팔찌 전체 효과는 고정 옵션과 랜덤 옵션이 섞일 수 있어 하나의 랜덤 목표로 계산하지 않습니다.') + '</p></div>'
            + '<div class="combo-chip-grid">' + effectHtml + '</div>'
            + '<div class="notice-panel"><strong>계산 제한</strong>' + limitHtml + '</div>'
            + '</div>';
        }
        function renderBraceletCard(data) {
          if (!data) return;
          var signature = cardSignature(data);
          if (!signature || signature === lastSignature) return;
          var attempts = 0;
          var timer = setInterval(function () {
            attempts += 1;
            var host = document.querySelector('.expected-panel.evidence-panel');
            if (!host && attempts < 20) return;
            clearInterval(timer);
            if (!host) return;
            var old = document.querySelector('[data-loa-hsi-bracelet-v54="true"]');
            if (old && old.dataset.signature === signature) return;
            var wrap = document.createElement('div');
            wrap.innerHTML = braceletCardHtml(data, signature);
            if (old) old.replaceWith(wrap.firstElementChild);
            else host.insertAdjacentElement('afterend', wrap.firstElementChild);
            lastSignature = signature;
          }, 100);
        }
        function marketSignature(data) {
          if (!data) return '';
          return JSON.stringify({
            version: data.version,
            summary: data.summary,
            accessoryTotal: data.accessoryMarket && data.accessoryMarket.total,
            bracelet: data.braceletMarket,
            items: ((data.accessoryMarket && data.accessoryMarket.items) || []).map(function (row) {
              var est = row.similarListingEstimate || {};
              return [row.slot, row.name, row.qualityBand, est.medianGold];
            })
          });
        }
        function marketCostCardHtml(data, signature) {
          var summary = data.summary || {};
          var accessory = data.accessoryMarket || {};
          var total = accessory.total || {};
          var bracelet = data.braceletMarket || {};
          var items = accessory.items || [];
          var limits = data.limits || [];
          var itemHtml = items.length ? items.map(function (row) {
            var est = row.similarListingEstimate || {};
            return '<div class="combo-chip">'
              + '<span>' + escapeHtml(row.partLabel || row.slot || '장신구') + ' · 품질 ' + escapeHtml(row.quality == null ? '-' : row.quality) + '</span>'
              + '<strong>' + gold(est.medianGold) + '</strong>'
              + '<small>' + gold(est.minGold) + ' ~ ' + gold(est.q75Gold) + ' · ' + escapeHtml(row.qualityBand || '-') + '</small>'
              + '</div>';
          }).join('') : '<p class="hint">장신구 시장가 추정 항목이 없습니다.</p>';
          var limitHtml = limits.length ? '<ul>' + limits.map(function (line) { return '<li>' + escapeHtml(line) + '</li>'; }).join('') + '</ul>' : '';
          return '<div class="expected-panel evidence-panel loa-hsi-market-v601" data-loa-hsi-market-v601="true" data-signature="' + escapeHtml(signature) + '">'
            + '<h3>v60.1 시장 재현 비용</h3>'
            + '<p class="hint evidence-intro">장신구/팔찌 구매 비용은 운 판정과 분리해 표시합니다. 현재 값은 실제 거래소 조회 전 단계의 임시 시장가 추정입니다.</p>'
            + '<div class="evidence-card-grid">'
            + '<section class="evidence-card">'
            + '<div class="evidence-card-head"><strong>시장 재현 합계</strong><span>' + escapeHtml(data.tradeApiConnected ? '실매물 연동' : '임시 추정') + '</span></div>'
            + '<div class="evidence-line highlight"><span>합계</span><strong>' + gold(summary.marketReproductionGold) + '</strong></div>'
            + '<div class="evidence-line"><span>장신구 중앙값</span><strong>' + gold(summary.accessoryMedianGold) + '</strong></div>'
            + '<div class="evidence-line"><span>팔찌 기억 기반</span><strong>' + gold(summary.braceletActualGold) + '</strong></div>'
            + '</section>'
            + '<section class="evidence-card">'
            + '<div class="evidence-card-head"><strong>장신구 시장가</strong><span>' + number(total.itemCount, 0) + '개</span></div>'
            + '<div class="evidence-line highlight"><span>중앙값 합계</span><strong>' + gold(total.medianGold) + '</strong></div>'
            + '<div class="evidence-line"><span>하위 25%</span><strong>' + gold(total.q25Gold) + '</strong></div>'
            + '<div class="evidence-line"><span>상위 25%</span><strong>' + gold(total.q75Gold) + '</strong></div>'
            + '</section>'
            + '<section class="evidence-card">'
            + '<div class="evidence-card-head"><strong>팔찌 비용</strong><span>' + escapeHtml(bracelet.gradeLabel || '-') + '</span></div>'
            + '<div class="evidence-line highlight"><span>입력 시도 수</span><strong>' + number(bracelet.userAttempts, 0) + '회</strong></div>'
            + '<div class="evidence-line"><span>팔찌 돌 1회</span><strong>' + gold(bracelet.rerollStonePriceGold) + '</strong></div>'
            + '<div class="evidence-line"><span>기대 기준 비용</span><strong>' + gold(bracelet.expectedReproductionCostGold) + '</strong></div>'
            + '</section>'
            + '</div>'
            + '<div class="combo-chip-grid">' + itemHtml + '</div>'
            + '<div class="notice-panel"><strong>비용/운 분리</strong><p class="hint">구형 장신구 시뮬레이션 비용은 연마 확률 기반 참고값이고, 실제 구매 재현 비용은 이 시장가 카드의 값을 우선합니다.</p></div>'
            + '<div class="notice-panel"><strong>계산 제한</strong>' + limitHtml + '</div>'
            + '</div>';
        }
        function renderMarketCostCard(data) {
          if (!data) return;
          var signature = marketSignature(data);
          if (!signature || signature === lastMarketSignature) return;
          var attempts = 0;
          var timer = setInterval(function () {
            attempts += 1;
            var host = document.querySelector('[data-loa-hsi-bracelet-v54="true"]') || document.querySelector('.expected-panel.evidence-panel');
            if (!host && attempts < 20) return;
            clearInterval(timer);
            if (!host) return;
            var old = document.querySelector('[data-loa-hsi-market-v601="true"]');
            if (old && old.dataset.signature === signature) return;
            var wrap = document.createElement('div');
            wrap.innerHTML = marketCostCardHtml(data, signature);
            if (old) old.replaceWith(wrap.firstElementChild);
            else host.insertAdjacentElement('afterend', wrap.firstElementChild);
            lastMarketSignature = signature;
          }, 100);
        }
        function patchStaticLabels() {
          var tries = 0;
          var timer = setInterval(function () {
            tries += 1;
            var badge = document.querySelector('.hero .eyebrow');
            if (badge) badge.textContent = 'LOA-HSI v60.1';
            var list = document.querySelector('.version-history-list');
            if (list && !list.querySelector('[data-version="v60.1"]')) {
              var item = document.createElement('p');
              item.dataset.version = 'v60.1';
              item.innerHTML = '<strong>v60.1</strong> 시장가 기반 장신구/팔찌 비용을 운 판정과 분리하고, 팔찌 기대값을 필요한 카테고리 개수 기준으로 보정했습니다.';
              list.prepend(item);
            }
            injectBraceletSlotInputs();
            if (currentCharacter) renderMemoryPanel(currentCharacter);
            if ((badge && list) || tries >= 30) clearInterval(timer);
          }, 150);
        }
        window.__LOA_HSI_VERSION_PATCH__ = patchStaticLabels;
        var originalFetch = window.fetch.bind(window);
        window.fetch = function () {
          var input = arguments[0];
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          var args = Array.prototype.slice.call(arguments);
          var comparePayloadForSave = null;
          if (String(url).indexOf('/simulations/compare-character') >= 0 && args[1] && args[1].body) {
            try {
              var payload = JSON.parse(args[1].body);
              var slots = readBraceletSlotInputs();
              var memoryHints = cloneJson(payload.memoryHints || {});
              if (loadedMemoryHints) memoryHints = cloneJson(loadedMemoryHints);
              memoryHints.braceletAcquisition = memoryHints.braceletAcquisition || {};
              if (slots.fixedOptionCount !== '') memoryHints.braceletAcquisition.fixedOptionCount = slots.fixedOptionCount;
              if (slots.randomOptionSlotCount !== '') memoryHints.braceletAcquisition.randomOptionSlotCount = slots.randomOptionSlotCount;
              payload.memoryHints = memoryHints;
              comparePayloadForSave = cloneJson(payload);
              pendingComparePayload = comparePayloadForSave;
              args[1] = Object.assign({}, args[1], { body: JSON.stringify(payload) });
            } catch (e) {}
          }
          return originalFetch.apply(window, args).then(function (response) {
            if (String(url).indexOf('/characters/') >= 0 && String(url).indexOf('/summary') >= 0 && response.ok) {
              response.clone().json().then(function (data) {
                setCurrentCharacter(data);
              }).catch(function () {});
            }
            if (String(url).indexOf('/simulations/compare-character') >= 0) {
              response.clone().json().then(function (data) {
                if (data && data.character) setCurrentCharacter(data.character);
                renderBraceletCard(data && data.expectedValues && data.expectedValues.officialBraceletT4);
                renderMarketCostCard(data && data.expectedValues && data.expectedValues.marketCost);
                if (response.ok && (comparePayloadForSave || pendingComparePayload)) {
                  saveMemoryRecord(comparePayloadForSave || pendingComparePayload, data && data.character ? data.character : currentCharacter);
                }
              }).catch(function () {});
            }
            return response;
          });
        };
        document.addEventListener('DOMContentLoaded', patchStaticLabels);
      })();
